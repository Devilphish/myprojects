function frunc(x, dec_places)
{
     var shift = Math.pow(10, dec_places);
     return Math.trunc(x * shift) / shift;
}

var coordmsg;

function log_eye()
{
    coordmsg.innerHTML = "eye location\n";
    coordmsg.innerHTML += frunc(eye_coord[0], 1) + "\n" + frunc(eye_coord[1], 1) + "\n" + frunc(eye_coord[2], 1) + "\n\n";
    coordmsg.innerHTML += "eye vector\n";
    coordmsg.innerHTML += eye_vector.hrot + " " + eye_vector.vrot;
}

function refreshFrame()
{
    context.clearRect(0, 0, 1000, 1000);

    log_eye();
    draw_points();
    draw_boxes(boxes);
}

var grid_inc = 5;
var vect_inc = 2;

var shift = false;

var iId = null;

function moveBehind()
{
    var radians = -eye_vector.hrot * Math.PI / 180;
    eye_coord[0] -= Math.sin(radians) * grid_inc;
    radians = -eye_vector.vrot * Math.PI / 180;
    eye_coord[1] -= Math.sin(radians) * grid_inc;
    radians = -eye_vector.hrot * Math.PI / 180;
    eye_coord[2] -= Math.cos(radians) * grid_inc;

    refreshFrame();
}

function moveAhead()
{
    var radians = -eye_vector.hrot * Math.PI / 180;
    eye_coord[0] += Math.sin(radians) * grid_inc;
    radians = -eye_vector.vrot * Math.PI / 180;
    eye_coord[1] += Math.sin(radians) * grid_inc;
    radians = -eye_vector.hrot * Math.PI / 180;
    eye_coord[2] += Math.cos(radians) * grid_inc;

    refreshFrame();
}

function rotateLeft()
{
    eye_vector.hrot += vect_inc;
    if (eye_vector.hrot > 180) {
        eye_vector.hrot -= 360;
    }

    refreshFrame();
}

function rotateRight()
{
    eye_vector.hrot -= vect_inc;
    if (eye_vector.hrot < -180) {
        eye_vector.hrot += 360;
    }

    refreshFrame();
}

function rotateUp()
{
    eye_vector.vrot -= vect_inc;
    if (eye_vector.vrot < -90) {
        eye_vector.vrot = -90;
    }

    refreshFrame();
}

function rotateDown()
{
    eye_vector.vrot += vect_inc;
    if (eye_vector.vrot > 90) {
        eye_vector.vrot = 90;
    }

    refreshFrame();
}

function keyDownEvent(e)
{
//    statusmsg.innerHTML = e.code;
    console.log("keydown: " + e.code);

    e.preventDefault();
    if (e.repeat) {
        return;
    }

    switch (e.code) {
      case "ShiftLeft":
      case "ShiftRight":
        shift = true;
        break;
      case "Digit0":
        eye_coord[0] = eye_coord_init[0];
        eye_coord[1] = eye_coord_init[1];
        eye_coord[2] = eye_coord_init[2];
        eye_vector.hrot = 0;
        eye_vector.vrot = 0;
        break;
      case "Space":
        if (shift) {
            moveBehind();
            if (iId != null) clearInterval(iId);
            iId = setInterval(moveBehind, 100);
        }
        else {
            moveAhead();
            if (iId != null) clearInterval(iId);
            iId = setInterval(moveAhead, 100);
        }
        break;
      case "KeyA":
        eye_coord[0] -= grid_inc;
        break;
      case "KeyD":
        eye_coord[0] += grid_inc;
        break;
      case "KeyW":
        eye_coord[1] += grid_inc;
        break;
      case "KeyS":
        eye_coord[1] -= grid_inc;
        break;
      case "KeyQ":
        eye_coord[2] += grid_inc;
        break;
      case "KeyZ":
        eye_coord[2] -= grid_inc;
        break;
      case "ArrowLeft":
        rotateLeft();
        if (iId != null) clearInterval(iId);
        iId = setInterval(rotateLeft, 100);
        break;
      case "ArrowRight":
        rotateRight();
        if (iId != null) clearInterval(iId);
        iId = setInterval(rotateRight, 100);
        break;
      case "ArrowUp":
        rotateUp();
        if (iId != null) clearInterval(iId);
        iId = setInterval(rotateUp, 100);
        break;
      case "ArrowDown":
        rotateDown();
        if (iId != null) clearInterval(iId);
        iId = setInterval(rotateDown, 100);
        break;
    }

    refreshFrame();
}

function keyUpEvent(e)
{
    console.log("keyup: " + e.code);

    switch (e.code) {
      case "ShiftLeft":
      case "ShiftRight":
        shift = false;
        break;
      case "Space":
      case "ArrowLeft":
      case "ArrowRight":
      case "ArrowUp":
      case "ArrowDown":
        clearInterval(iId);
        iId = null;
        break;
    }
}

function rotate_yaxis(p_xyz, hrot)
{
    var p_rot = [];
    var x = p_xyz[0];
    var z = p_xyz[2];

    var xz_vec = Math.sqrt(x ** 2 + z ** 2);
    var yaxis_theta;
    if (z == 0) {
        if (x < 0) {
            yaxis_theta = 90;
        }
        else {
            yaxis_theta = -90;
        }
    }
    else {
        yaxis_theta = Math.atan(-x / z) * 90/(Math.PI/2);
    }
    if (z < 0) {
        yaxis_theta += 180;
        if (yaxis_theta > 180) yaxis_theta -= 360;
    }
    var yaxis_theta_prime = yaxis_theta - hrot;
    p_rot[0] = -Math.sin(yaxis_theta_prime * Math.PI/180) * xz_vec;
    p_rot[1] = p_xyz[1];
    p_rot[2] = Math.cos(yaxis_theta_prime * Math.PI/180) * xz_vec;

    return p_rot;
}

function rotate_xaxis(p_xyz, vrot)
{
    var p_rot = [];
    var y = p_xyz[1];
    var z = p_xyz[2];

    var yz_vec = Math.sqrt(y ** 2 + z ** 2);
    var xaxis_theta;
    if (z == 0) {
        if (y > 0) {
            xaxis_theta = 90;
        }
        else {
            xaxis_theta = -90;
        }
    }
    else {
        xaxis_theta = Math.atan(y / z) * 90/(Math.PI/2);
    }
    if (z < 0) {
        xaxis_theta += 180;
        if (xaxis_theta > 180) xaxis_theta -= 360;
    }
    var xaxis_theta_prime = xaxis_theta - -vrot;
    p_rot[0] = p_xyz[0];
    p_rot[1] = Math.sin(xaxis_theta_prime * Math.PI/180) * yz_vec;
    p_rot[2] = Math.cos(xaxis_theta_prime * Math.PI/180) * yz_vec;

    return p_rot;
}

function xlate_vector(p_xyz)
{
    var x = p_xyz[0];
    var y = p_xyz[1];
    var z = p_xyz[2];

    var h = Math.sqrt(x ** 2 + z ** 2);
    var v = Math.sqrt(y ** 2 + z ** 2);

    var theta_h;
    if (h == 0) {
        theta_h = 0;
    }
    else {
        theta_h = Math.asin(x / h) * 90/(Math.PI/2);
    }
    var theta_v;
    if (v == 0) {
        theta_v = 0;
    }
    else {
        theta_v = Math.asin(y / v) * 90/(Math.PI/2);
    }
if (1) {
    if (z < 0) {
        theta_v = 180 - theta_v;
        if (theta_v > 180) theta_v -= 360;
//        theta_h = 180 - theta_h;
//        if (theta_h > 180) theta_h -= 360;
    }
}
if (1) {
// why is this not needed?
    if (z < 0) {
        theta_h = 180 - theta_h;
        if (theta_h > 180) theta_h -= 360;
    }
}

    var p_v = {};
    p_v.hrot = theta_h;
    p_v.vrot = theta_v;
    p_v.r = v;

    return p_v;
}

function xlate_3d(e_xyz, p_xyz)
{
    var p_prime;
    var p_rel = [];
    p_rel[0] = p_xyz[0] - e_xyz[0];
    p_rel[1] = p_xyz[1] - e_xyz[1];
    p_rel[2] = p_xyz[2] - e_xyz[2];

    //
    // For horizontal rotation (left/right arrow):
    // rotate y-axis first to model camera swing on y-axis
    // rotate x-axis first to model camera swing from vrot
    //
    p_prime = rotate_yaxis(p_rel, eye_vector.hrot);
    p_prime = rotate_xaxis(p_prime, eye_vector.vrot);

    return xlate_vector(p_prime);
}

var fov = 20;

function xlate_canvasxy(p_v)
{
    var c_xy = {};
    c_xy.x = p_v.hrot * 500 / fov;
    c_xy.y = p_v.vrot * 500 / fov;

    return c_xy;
}

function threeD_to_canvasxy(point)
{

    var point_vector = xlate_3d(eye_coord, point);

    if (point_vector.hrot > 180) point_vector.hrot -= 360;
    else if (point_vector.hrot < -180) point_vector.hrot += 360;
    if (point_vector.vrot > 180) point_vector.vrot -= 360;
    else if (point_vector.vrot < -180) point_vector.vrot += 360;

    var canvas_xy = xlate_canvasxy(point_vector);
    if (Math.abs(point_vector.hrot) > fov ||
        Math.abs(point_vector.vrot) > fov) {
        canvas_xy.in_frame = false;
    }
    else {
        canvas_xy.in_frame = true;
    }

    canvas_xy.x = 500 + canvas_xy.x;
    canvas_xy.y = 500 - canvas_xy.y;
    canvas_xy.r = point_vector.r;

    return canvas_xy
}

function face_visible(point, hrot, vrot)
{
    var p_rel = [];
    p_rel[0] = point[0] - eye_coord[0];
    p_rel[1] = point[1] - eye_coord[1];
    p_rel[2] = point[2] - eye_coord[2];

    var point_vector = xlate_vector(p_rel);

    if ((Math.abs(vrot) != 90 && Math.abs(hrot + point_vector.hrot) > 90) ||
        (vrot != 0 && Math.abs(vrot - point_vector.vrot) > 90)) {
        return true;
    }
    else {
        return false;
    }
}

function draw_boxes(b)
{
    var visible_boxes = [];

    for (var i = 0; i < b.length; i++) {
        var point = [ b[i].xyz[0], eye_coord[1], b[i].xyz[2] ];
//        var point = [ b[i].xyz[0], b[i].xyz[1], b[i].xyz[2] ];
        var canvas_xy = threeD_to_canvasxy(point);
        if (canvas_xy.in_frame) {
            canvas_xy.box = b[i];
            visible_boxes.push(canvas_xy);
        }
        visible_boxes.sort(function(a,b) {return b.r - a.r});
    }
    for (var i = 0; i < visible_boxes.length; i++) {
        draw_box(visible_boxes[i].box);
    }
}

function draw_box(b)
{
    var p_tbl = [ b.xyz[0] - b.whd[0] / 2,
                  b.xyz[1] + b.whd[1] / 2,
                  b.xyz[2] + b.whd[2] / 2 ];
    var p_tbr = [ b.xyz[0] + b.whd[0] / 2,
                  b.xyz[1] + b.whd[1] / 2,
                  b.xyz[2] + b.whd[2] / 2 ];
    var p_tfr = [ b.xyz[0] + b.whd[0] / 2,
                  b.xyz[1] + b.whd[1] / 2,
                  b.xyz[2] - b.whd[2] / 2 ];
    var p_tfl = [ b.xyz[0] - b.whd[0] / 2,
                  b.xyz[1] + b.whd[1] / 2,
                  b.xyz[2] - b.whd[2] / 2 ];
    var p_bbl = [ b.xyz[0] - b.whd[0] / 2,
                  b.xyz[1] - b.whd[1] / 2,
                  b.xyz[2] + b.whd[2] / 2 ];
    var p_bbr = [ b.xyz[0] + b.whd[0] / 2,
                  b.xyz[1] - b.whd[1] / 2,
                  b.xyz[2] + b.whd[2] / 2 ];
    var p_bfr = [ b.xyz[0] + b.whd[0] / 2,
                  b.xyz[1] - b.whd[1] / 2,
                  b.xyz[2] - b.whd[2] / 2 ];
    var p_bfl = [ b.xyz[0] - b.whd[0] / 2,
                  b.xyz[1] - b.whd[1] / 2,
                  b.xyz[2] - b.whd[2] / 2 ];
    var canvas_xy;

    context.fillStyle = b.color;
    context.strokeStyle = b.borderColor;

    // top face
    if (face_visible(p_tbl, 0, 90)) {
        context.beginPath();

        canvas_xy = threeD_to_canvasxy(p_tbl);
        context.moveTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tbr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tfr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tfl);
        context.lineTo(canvas_xy.x, canvas_xy.y);

        context.closePath();
        if (fill) {
            context.fill();
        }
        context.stroke();
    }

    // bottom face
    if (face_visible(p_bbl, 0, -90)) {
        context.beginPath();

        canvas_xy = threeD_to_canvasxy(p_bbl);
        context.moveTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bbr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bfr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bfl);
        context.lineTo(canvas_xy.x, canvas_xy.y);

        context.closePath();
        if (fill) {
            context.fill();
        }
        context.stroke();
    }

    // left face
    if (face_visible(p_bbl, 90, 0)) {
        context.beginPath();

        canvas_xy = threeD_to_canvasxy(p_bbl);
        context.moveTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tbl);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tfl);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bfl);
        context.lineTo(canvas_xy.x, canvas_xy.y);

        context.closePath();
        if (fill) {
            context.fill();
        }
        context.stroke();
    }

    // right face
    if (face_visible(p_bbr, -90, 0)) {
        context.beginPath();

        canvas_xy = threeD_to_canvasxy(p_bbr);
        context.moveTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tbr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tfr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bfr);
        context.lineTo(canvas_xy.x, canvas_xy.y);

        context.closePath();
        if (fill) {
            context.fill();
        }
        context.stroke();
    }

    // back face
    if (face_visible(p_bbr, 0, 0)) {
        context.beginPath();

        canvas_xy = threeD_to_canvasxy(p_bbr);
        context.moveTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tbr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tbl);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bbl);
        context.lineTo(canvas_xy.x, canvas_xy.y);

        context.closePath();
        if (fill) {
            context.fill();
        }
        context.stroke();
    }

    // front face
    if (face_visible(p_bfr, 180, 0)) {
        context.beginPath();

        canvas_xy = threeD_to_canvasxy(p_bfr);
        context.moveTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tfr);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_tfl);
        context.lineTo(canvas_xy.x, canvas_xy.y);
        canvas_xy = threeD_to_canvasxy(p_bfl);
        context.lineTo(canvas_xy.x, canvas_xy.y);

        context.closePath();
        if (fill) {
            context.fill();
        }
        context.stroke();
    }
}

var point_radius = 3;

function draw_points()
{
    var visible_points = [];

    for (var i = 0; i < points.length; i++) {
        var point = points[i];
        var canvas_xy = threeD_to_canvasxy(point);
        if (canvas_xy.in_frame) {
            if (point.length < 4) {
                canvas_xy.color = "#80ff00";
            }
            else {
                canvas_xy.color = point[3];
            }
            visible_points.push(canvas_xy);
        }
    }

    visible_points.sort(function(a,b) {return b.r - a.r});

    for (var i = 0; i < visible_points.length; i++) {
        var canvas_xy = visible_points[i];

        context.fillStyle = canvas_xy.color;
        context.strokeStyle = canvas_xy.color;
        context.beginPath();
        context.arc(canvas_xy.x, canvas_xy.y, point_radius, 0, 2 * Math.PI);
        if (fill) {
            context.fill();
        }
        else {
            context.stroke();
        }
    }
}
